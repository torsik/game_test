<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #fff; color: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 40px 24px; max-width: 760px; margin: 0 auto;
    }
    h1 { font-size: 1.3rem; font-weight: 600; margin-bottom: 4px; }
    .sub { font-size: 0.85rem; color: #666; margin-bottom: 28px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 0.8rem; font-weight: 500; margin-bottom: 5px; }
    .field input, .field textarea {
      width: 100%; border: 1.5px solid #ccc; border-radius: 4px;
      padding: 10px 12px; font-size: 0.9rem; outline: none; font-family: inherit;
    }
    .field input:focus, .field textarea:focus { border-color: #000; }
    .field textarea { height: 72px; resize: vertical; }
    .btn {
      width: 100%; padding: 11px; background: #000; color: #fff;
      border: none; border-radius: 4px; font-size: 0.9rem; cursor: pointer;
    }
    .btn:hover { background: #222; }
    #loginScreen { max-width: 340px; }
    #mainPanel { display: none; }
    .top-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; }
    .btn-sm {
      padding: 6px 14px; background: #fff; color: #000;
      border: 1.5px solid #000; border-radius: 4px; font-size: 0.8rem; cursor: pointer;
    }
    .btn-sm:hover { background: #000; color: #fff; }
    h2 { font-size: 1rem; font-weight: 600; margin-bottom: 14px; }
    #addForm { padding: 20px; border: 1.5px solid #000; border-radius: 6px; margin-bottom: 32px; }
    .file-zone {
      border: 2px dashed #ccc; border-radius: 4px; padding: 18px;
      text-align: center; cursor: pointer; font-size: 0.84rem; color: #888;
    }
    .file-zone:hover, .file-zone.drag { border-color: #000; color: #000; }
    .file-zone.has-file { border-color: #000; background: #f9f9f9; color: #000; }
    #fileInput { display: none; }
    table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    th {
      text-align: left; padding: 8px 10px; border-bottom: 2px solid #000;
      font-size: 0.73rem; text-transform: uppercase; letter-spacing: 0.07em;
    }
    td { padding: 10px; border-bottom: 1px solid #eee; vertical-align: top; }
    tr:hover td { background: #fafafa; }
    .code-cell { font-family: monospace; font-weight: 600; white-space: nowrap; }
    .msg-cell  { color: #333; max-width: 200px; word-break: break-word; font-size: 0.84rem; }
    .file-cell { font-size: 0.81rem; color: #555; }
    .date-cell { color: #aaa; font-size: 0.78rem; white-space: nowrap; }
    .btn-del {
      padding: 4px 10px; background: #fff; color: #000;
      border: 1.5px solid #000; border-radius: 4px; font-size: 0.78rem; cursor: pointer;
    }
    .btn-del:hover { background: #000; color: #fff; }
    .notice { padding: 10px 14px; border-radius: 4px; font-size: 0.84rem; margin-top: 10px; display: none; }
    .notice.ok  { border: 1px solid #000; background: #f9f9f9; display: block; }
    .notice.err { border: 1px solid #c00; color: #c00; display: block; }
    #emptyMsg { color: #aaa; font-size: 0.87rem; margin-top: 12px; display: none; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h1>Admin Panel</h1>
  <p class="sub">Enter your credentials to access.</p>
  <div class="field">
    <label>Admin Password</label>
    <input type="password" id="passInput" placeholder="••••••••" autocomplete="off"/>
  </div>
  <div class="field">
    <label>API Key</label>
    <input type="password" id="apiKeyInput" placeholder="••••••••" autocomplete="off"/>
  </div>
  <button class="btn" onclick="login()">Login</button>
  <div class="notice" id="loginNotice"></div>
</div>

<!-- MAIN -->
<div id="mainPanel">
  <div class="top-bar">
    <div>
      <h1>Code Management</h1>
      <p class="sub">Add and delete codes.</p>
    </div>
    <button class="btn-sm" onclick="logout()">Logout</button>
  </div>

  <div id="addForm">
    <h2>Add Code</h2>
    <div class="field">
      <label>Code *</label>
      <input type="text" id="newCode" placeholder="VIP-2025" spellcheck="false"/>
    </div>
    <div class="field">
      <label>Message (optional)</label>
      <textarea id="newMsg" placeholder="Text that the user will see..."></textarea>
    </div>
    <div class="field">
      <label>File or image (optional, max 10MB)</label>
      <div class="file-zone" id="fileZone"
        onclick="document.getElementById('fileInput').click()"
        ondragover="event.preventDefault();this.classList.add('drag')"
        ondragleave="this.classList.remove('drag')"
        ondrop="handleDrop(event)">
        <span id="fileZoneText">Click or drag a file here</span>
      </div>
      <input type="file" id="fileInput" onchange="handleFile(this.files[0])"/>
    </div>
    <button class="btn" onclick="addCode()">Add</button>
    <div class="notice" id="addNotice"></div>
  </div>

  <h2>All Codes</h2>
  <table>
    <thead>
      <tr><th>Code</th><th>Message</th><th>File</th><th>Added</th><th></th></tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <p id="emptyMsg">No codes yet.</p>
</div>

<script>
  // adminKey is stored only in memory — never in localStorage or cookies
  let adminKey = '';
  let selectedFile = null;

  document.getElementById('passInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('apiKeyInput').focus();
  });
  document.getElementById('apiKeyInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  async function login() {
    const pass   = document.getElementById('passInput').value.trim();
    const apiKey = document.getElementById('apiKeyInput').value.trim();
    if (!pass || !apiKey) {
      notice('loginNotice', 'Both fields are required.', false);
      return;
    }

    const res = await fetch('/api/admin/verify-ui', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pass })
    });

    if (res.status === 429) {
      const d = await res.json();
      notice('loginNotice', `Too many attempts. Wait ${d.retry_after} seconds.`, false);
      return;
    }

    const data = await res.json();
    if (data.success) {
      // apiKey is never returned by server — user must enter it themselves
      // This way even if verify-ui is compromised, apiKey stays secret
      adminKey = apiKey;
      document.getElementById('passInput').value   = '';
      document.getElementById('apiKeyInput').value = '';
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainPanel').style.display   = 'block';
      loadCodes();
    } else {
      notice('loginNotice', 'Incorrect password.', false);
    }
  }

  function logout() {
    adminKey = '';
    document.getElementById('loginScreen').style.display = 'block';
    document.getElementById('mainPanel').style.display   = 'none';
  }

  function handleFile(file) {
    if (!file) return;
    selectedFile = file;
    document.getElementById('fileZone').classList.add('has-file');
    document.getElementById('fileZoneText').textContent =
      `📎 ${file.name}  (${(file.size / 1024).toFixed(1)} KB)`;
  }

  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('fileZone').classList.remove('drag');
    handleFile(e.dataTransfer.files[0]);
  }

  function clearFile() {
    selectedFile = null;
    document.getElementById('fileInput').value = '';
    document.getElementById('fileZone').classList.remove('has-file');
    document.getElementById('fileZoneText').textContent = 'Click or drag a file here';
  }

  async function addCode() {
    const code    = document.getElementById('newCode').value.trim();
    const message = document.getElementById('newMsg').value.trim();
    if (!code) { notice('addNotice', 'Code is required.', false); return; }
    if (!message && !selectedFile) { notice('addNotice', 'Add a message or a file.', false); return; }

    const fd = new FormData();
    fd.append('code', code);
    fd.append('message', message);
    if (selectedFile) fd.append('file', selectedFile);

    const res = await fetch('/api/admin/codes', {
      method: 'POST',
      headers: { 'x-admin-key': adminKey },
      body: fd
    });

    if (res.status === 401) { notice('addNotice', 'Invalid API key.', false); return; }
    if (res.ok) {
      document.getElementById('newCode').value = '';
      document.getElementById('newMsg').value  = '';
      clearFile();
      notice('addNotice', 'Code added!', true);
      loadCodes();
    } else {
      const d = await res.json();
      notice('addNotice', d.detail || 'Error.', false);
    }
  }

  async function loadCodes() {
    const res = await fetch('/api/admin/codes', { headers: { 'x-admin-key': adminKey } });
    if (res.status === 401) { logout(); return; }
    if (!res.ok) return;
    const codes = await res.json();
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    document.getElementById('emptyMsg').style.display = codes.length === 0 ? 'block' : 'none';
    codes.forEach(c => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="code-cell">${esc(c.code)}</td>
        <td class="msg-cell">${esc(c.message || '—')}</td>
        <td class="file-cell">${c.file_name ? '📎 ' + esc(c.file_name) : '—'}</td>
        <td class="date-cell">${(c.created_at || '').slice(0, 16)}</td>
        <td><button class="btn-del" onclick="del(${c.id},this)">Delete</button></td>
      `;
      tbody.appendChild(tr);
    });
  }

  async function del(id, btn) {
    if (!confirm('Delete this code?')) return;
    btn.disabled = true;
    await fetch(`/api/admin/codes/${id}`, {
      method: 'DELETE',
      headers: { 'x-admin-key': adminKey }
    });
    loadCodes();
  }

  function notice(id, text, ok) {
    const el = document.getElementById(id);
    el.className = 'notice ' + (ok ? 'ok' : 'err');
    el.textContent = text;
    setTimeout(() => { el.className = 'notice'; }, 4000);
  }

  function esc(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
