version: "3.9"

services:

  app:
    build: ./app
    container_name: codelookup_app
    restart: unless-stopped
    environment:
      - DB_PATH=/data/codes.db
      - UPLOAD_DIR=/data/uploads
      - ADMIN_KEY=${ADMIN_KEY:-changeme}
      - ADMIN_UI_PASS=${ADMIN_UI_PASS:-adminpass}
      - RATE_LIMIT_ATTEMPTS=10
      - RATE_LIMIT_WINDOW=60
      - LOG_PATH=/data/app.log
    volumes:
      - app_data:/data
    expose:
      - "8000"
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: codelookup_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt/archive/boom323.space:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - app
    networks:
      - internal

volumes:
  app_data:

networks:
  internal:
